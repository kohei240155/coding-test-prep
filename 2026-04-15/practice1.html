<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>カウンター：<span id="counter">0</span></h1>
    <button id="startBad">悪い例：マイクロタスクで100万回更新</button>
    <button id="startGood">良い例：マクロタスクで分割更新</button>

    <script>
      const counterEl = document.getElementById('counter');

      document
        .getElementById('startBad')
        .addEventListener('click', function onBadClick() {
          console.log('悪い例: 開始');
          let count = 0;

          function microLoop() {
            if (count < 1000000) {
              count++;
              counterEl.textContent = count;
              queueMicrotask(microLoop);
            } else {
              console.log('悪い例：完了');
            }
          }
          microLoop();
        });

      document
        .getElementById('startGood')
        .addEventListener('click', function onGoodClick() {
          console.log('良い例： 開始');
          let count = 0;
          const batchSize = 1000;

          function macroLoop() {
            const end = Math.min(count + batchSize, 1000000);
            while (count < end) {
              count++;
            }
            counterEl.textContent = count;

            if (count < 100000) {
              setTimeout(macroLoop, 0);
            } else {
              console.log('良い例： 完了');
            }
          }

          macroLoop();
        });
    </script>
  </body>
</html>
